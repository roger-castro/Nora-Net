services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    hostname: cyan
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - npm-proxy

volumes:
  portainer_data:
    external: true

networks:
  npm-proxy:
    external: true